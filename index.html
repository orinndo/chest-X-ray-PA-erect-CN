<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>胸部レントゲン（胸部X光）语音指南</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;
background:linear-gradient(180deg,#f7fbff,#eef6ff);color:#0f172a;}
.header{padding:18px 16px 10px;}
.frame-title{border:2px solid #38bdf8;padding:14px 16px;border-radius:14px;background:#f8fcff;text-align:center;}
.frame-title h1{margin:0;font-size:20px;}
.frame-title p{margin:6px 0 0;font-size:14px;color:#475569;}
.note{font-size:12px;color:#475569;margin:12px 16px;}
.main{margin:0 16px 24px;padding:16px;background:#fff;border-radius:18px;box-shadow:0 8px 18px rgba(15,23,42,.08);}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
select{flex:1;max-width:100%;font-size:16px;padding:10px 36px 10px 12px;border-radius:12px;border:1px solid #cbd5f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
button{font-size:15px;padding:10px 14px;border-radius:12px;border:1px solid #cbd5f5;background:#eff6ff;}
button:active{transform:scale(.98);}
.label{margin-top:14px;font-size:13px;color:#475569;}
.jp{font-size:18px;font-weight:600;margin-top:6px;}
.en{font-size:16px;margin-top:4px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
audio{width:100%;margin-top:10px;}
.status{margin-top:8px;font-size:13px;color:#475569;}
.hint{margin-top:10px;font-size:12px;color:#64748b;}
</style>
</head>
<body>
<div class="header">
  <div class="frame-title">
    <h1>胸部レントゲン（胸部X光）</h1>
    <p>中文语音指南</p>
  </div>
</div>

<p class="note">※ iPhone / iPad / Android で再生できます。最初は「再生」を押してください。</p>

<div class="main">
  <div class="row">
    <select id="sel"></select>
    <button id="prev">← 前</button>
    <button id="next">次 →</button>
  </div>

  <div class="label">日本語（内容）</div>
  <div class="jp" id="jp"></div>

  <div class="label">中文（脚本）</div>
  <div class="en" id="en"></div>

  <div class="controls">
    <button id="play">▶︎ 再生</button>
    <button id="pause">⏸ 一時停止</button>
    <button id="replay">↻ もう一度</button>
  </div>

  <div class="status" id="status">待機中 / 准备就绪</div>
  <audio id="player" controls></audio>

  <div class="hint">
    再生できない場合：消音モード解除、音量、Bluetooth接続を確認してください。
  </div>
</div>

<script>
const STEPS = [
 {preview:"すみません、少しよろしいですか？", jp:"すみません、少しよろしいですか？", en:"不好意思，可以打扰您一下吗？  (Bù hǎo yìsi, kěyǐ dǎrǎo nín yíxià ma?)"},
 {preview:"こちらをご覧ください。これはあな…", jp:"こちらをご覧ください。これはあなたのお名前と生年月日で合っていますか？", en:"请看一下，这是不是您的姓名和出生日期？  (Qǐng kàn yíxià, zhè shì bú shì nín de xìngmíng hé chūshēng rìqī ma?)"},
 {preview:"お名前と生年月日を教えていただけ…", jp:"お名前と生年月日を教えていただけますか？", en:"可以请您说一下您的姓名和出生日期吗？  (Kěyǐ qǐng nín shuō yíxià nín de xìngmíng hé chūshēng rìqī ma?)"},
 {preview:"どうぞお入りください。", jp:"どうぞお入りください。", en:"请进。  (Qǐng jìn.)"},
 {preview:"これから胸部レントゲンを撮影しま…", jp:"これから胸部レントゲンを撮影します。", en:"现在要给您拍胸部X光。  (Xiànzài yào gěi nín pāi xiōngbù X-guāng.)"},
 {preview:"身につけている金属類を外してくだ…", jp:"身につけている金属類を外してください。", en:"请把身上的金属物品取下来。  (Qǐng bǎ shēnshang de jīnshǔ wùpǐn qǔ xiàlái.)"},
 {preview:"ワイヤー入りの下着を着用している…", jp:"ワイヤー入りの下着を着用している場合は、脱いでください。", en:"如果您穿的是带钢圈的内衣，请您脱下来。  (Rúguǒ nín chuān de shì dài gāngquān de nèiyī, qǐng nín tuō xiàlái.)"},
 {preview:"金属のついた下着は検査に影響しま…", jp:"金属のついた下着は検査に影響しますので、脱いでください。", en:"带有金属的内衣会影响检查，请脱掉。  (Dài yǒu jīnshǔ de nèiyī huì yǐngxiǎng jiǎnchá, qǐng tuō diào.)"},
 {preview:"ここに立って、胸をこのパネルにつ…", jp:"ここに立って、胸をこのパネルにつけてください。", en:"请站在这里，把胸口贴在这块板上。  (Qǐng zhàn zài zhèlǐ, bǎ xiōngkǒu tiē zài zhè kuài bǎn shàng.)"},
 {preview:"あごをここにのせてください。", jp:"あごをここにのせてください。", en:"请把下巴放在这里。  (Qǐng bǎ xiàba fàng zài zhèlǐ.)"},
 {preview:"両手で機械を抱えるようにしてくだ…", jp:"両手で機械を抱えるようにしてください。", en:"双手抱住机器。  (Shuāngshǒu bàozhù jīqì.)"},
 {preview:"動かないでください。", jp:"動かないでください。", en:"请不要动。  (Qǐng búyào dòng.)"},
 {preview:"大きく息を吸って、止めてください…", jp:"大きく息を吸って、止めてください。", en:"深吸一口气，屏住呼吸。  (Shēn xī yì kǒu qì, píng zhù hūxī.)"},
 {preview:"はい、呼吸していいですよ。", jp:"はい、呼吸していいですよ。", en:"好了，可以呼吸了。  (Hǎo le, kěyǐ hūxī le.)"},
 {preview:"横を向いてください。", jp:"横を向いてください。", en:"请转向侧面。  (Qǐng zhuǎn xiàng cèmiàn.)"},
 {preview:"両手を頭の上にあげてください。", jp:"両手を頭の上にあげてください。", en:"请把双手举到头上。  (Qǐng bǎ shuāngshǒu jǔ dào tóu shàng.)"},
 {preview:"動かないでください。", jp:"動かないでください。", en:"请不要动。  (Qǐng búyào dòng.)"},
 {preview:"息を吸って止めてください。", jp:"息を吸って止めてください。", en:"深吸一口气，屏住呼吸。  (Shēn xī yì kǒu qì, píng zhù hūxī.)"},
 {preview:"呼吸して大丈夫です。", jp:"呼吸して大丈夫です。", en:"可以呼吸了。  (Kěyǐ hūxī le.)"},
 {preview:"楽にしてください。", jp:"楽にしてください。", en:"请放松。  (Qǐng fàngsōng.)"},
 {preview:"検査は終わりました。", jp:"検査は終わりました。", en:"检查结束了。  (Jiǎnchá jiéshù le.)"},
 {preview:"次は診察がありますので、10番へ…", jp:"次は診察がありますので、10番へ行ってこのファイルを提出してください。", en:"接下来要看医生，请您到10号，把这个文件交给工作人员。  (Jiēxiàlái yào kàn yīshēng, qǐng nín dào shí hào, bǎ zhège wénjiàn jiāo gěi gōngzuòrényuán.)"},
 {preview:"もう着替えてもいいですよ。", jp:"もう着替えてもいいですよ。", en:"您可以换衣服了。  (Nín kěyǐ huàn yīfu le.)"},
 {preview:"まだ他の検査が残っています。", jp:"まだ他の検査が残っています。", en:"还有其他检查项目。  (Hái yǒu qítā jiǎnchá xiàngmù.)"},
 {preview:"まだ着替えないでください。", jp:"まだ着替えないでください。", en:"请不要换衣服。  (Qǐng búyào huàn yīfu.)"},
 {preview:"19番の前の椅子に座ってお待ちく…", jp:"19番の前の椅子に座ってお待ちください。", en:"请您在19号门口的椅子上坐着等候。  (Qǐng nín zài shíjiǔ hào ménkǒu de yǐzi shàng zuòzhe děnghòu.)"}
];

const sel=document.getElementById('sel'),
jp=document.getElementById('jp'),
en=document.getElementById('en'),
player=document.getElementById('player'),
status=document.getElementById('status');

STEPS.forEach((s,i)=>{
 const o=document.createElement('option');
 o.value=i;
 o.textContent=`${String(i+1).padStart(2,'0')}｜${s.jp}`;
 sel.appendChild(o);
});

let idx=0;
function load(i){
 idx=Math.max(0,Math.min(STEPS.length-1,i));
 sel.value=idx;
 jp.textContent=STEPS[idx].jp;
 en.textContent=STEPS[idx].en;
 player.src=`audio/step_${String(idx+1).padStart(2,'0')}.m4a`;
 status.textContent="待機中 / 准备就绪";
}
sel.onchange=()=>load(parseInt(sel.value));
document.getElementById('prev').onclick=()=>load(idx-1);
document.getElementById('next').onclick=()=>load(idx+1);
document.getElementById('play').onclick=()=>player.play();
document.getElementById('pause').onclick=()=>player.pause();
document.getElementById('replay').onclick=()=>{player.currentTime=0;player.play();}
player.onplay=()=>status.textContent="再生中 / 播放中";
player.onpause=()=>status.textContent="一時停止 / 已暂停";
player.onended=()=>status.textContent="待機中 / 准备就绪";
load(0);
</script>
</body>
</html>
